<script>
(function () {
  function postHeight() {
    // Measure body content only. documentElement.scrollHeight tracks the
    // iframe's own viewport, which would feed back and grow the page forever.
    var h = document.body ? document.body.scrollHeight : 0;
    if (h && window.parent !== window) parent.postMessage({ __frameHeight: h }, '*');
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  document.addEventListener('DOMContentLoaded', postHeight);
  window.addEventListener('message', function (e) {
    if (e.data && e.data.__requestHeight) postHeight();
  });
  // Fires the moment body content reflows — when this tab is shown (going from
  // display:none to visible) and as images finish loading. Observing body, not
  // documentElement, avoids any feedback loop since body height tracks content.
  if (window.ResizeObserver && document.body) {
    new ResizeObserver(postHeight).observe(document.body);
  }
  Array.prototype.forEach.call(document.images, function (img) {
    img.addEventListener('load', postHeight);
    img.addEventListener('error', postHeight);
  });
  setTimeout(postHeight, 300);
  setTimeout(postHeight, 1000);
})();
</script>
